name: '01-first-workflow'
run-name: 'First workflow'
on:
  workflow_dispatch:
  # schedule:
  #   - cron: 0 23 */10 * * 
  # push:
  #   branches:
  #     - main
  # pull_request:
  #   branches:
  #     - main
jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: echo-hello
        run: echo 'Hello World!'
  goodbye-world:
    runs-on: ubuntu-latest
    needs: hello-world
    steps:
      - name: failed_step
        run: |
          for ((i = 1; i<=10; i++)); do
            echo "I will fail!";
          done
          exit 1
      - name: 'echo-goodbye'
        run: echo 'Goodbye World!'
  i-wont-run:
    runs-on: ubuntu-latest
    needs: goodbye-world
    steps:
      - name: wont_run
        run: echo "I won't run"
  i-will-run:
    runs-on: ubuntu-latest
    needs: goodbye-world
    if: always()
    steps:
      - name: i_will_run
        run: echo 'I will run!'
